<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <link href="/favicon.ico" rel="icon">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>AND ADMINISTRATOR LOGIN</title>
    <meta content="AND 어드민 로그인" name="description">
    <meta content="website" property="og:type">
    <meta content="yes" name="apple-mobile-web-app-capable">
    <link rel="stylesheet" href="css/default.css">
    <link rel="stylesheet" href="css/style.css">
	<link rel="stylesheet" as="style" crossorigin
	href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
	<link
	href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
	rel="stylesheet">
	 <!-- jq -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" crossorigin="anonymous"></script>

</head>
<body>
    <div id="wrap">
        <div class="admin">
            <div class="adm_login_wrap">
                <h1 class="logo">
                    <a href="index.html"><img src="image/and_logo.png" alt="AND"></a>
                </h1>
                <div class="login_form">
                    <div class="login_box">
                        <div class="login_field">
                            <label for="user_email">이메일</label>
                            <input type="text" id="user_email" placeholder="이메일을 입력해주세요.">
                        </div>
                        <div class="login_field">
                            <label for="user_pw">비밀번호</label>
                            <input type="password" id="user_pw" placeholder="비밀번호를 입력해주세요">
                        </div>
                        <input type="submit" class="login_btn" value="로그인">
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
